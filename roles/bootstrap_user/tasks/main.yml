- name: Get hostname using the `hostname` command
  ansible.builtin.command: hostname
  register: hostname_output
  changed_when: false

- name: Map hostname to 127.0.0.1
  ansible.builtin.lineinfile:
    path: /etc/hosts
    line: "127.0.0.1  {{ hostname_output.stdout }}"
    state: present
