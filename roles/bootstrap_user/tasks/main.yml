- name: ensure sudo is installed
  ansible.builtin.apt:
    name: sudo
    state: present
  when: "'sudo' in groups"

- name: "make user {{ user }}"
  ansible.builtin.user:
    user: "{{ user }}"
    shell: /bin/bash
    password: "{{ user_pswd_hash }}"

- name: Ensure groups exist
  ansible.builtin.group:
    name: "{{ item }}"
    state: present
  loop: "{{ user_groups }}"
  when: user_groups | length > 0

- name: Ensure user is appended to groups
  ansible.builtin.user:
    name: "{{ user }}"
    groups: "{{ user_groups }}"
    append: true
  when: user_groups | length > 0
  
