- name: Ensure user password is given
  ansible.builtin.assert:
    that:
      - user_pswd_hash is not none
      - user_pswd_hash | length > 0
    fail_msg: "You must provide 'user_pswd_hash'"

- name: ensure sudo is installed
  ansible.builtin.apt:
    pkg: sudo
    state: present

- name: "make user {{ user }}"
  ansible.builtin.user:
    user: "{{ user }}"
    shell: /bin/bash
    password: "{{ user_pswd_hash }}"
    groups: sudo
    append: true

