- name: Ensure sudo is installed
  ansible.builtin.apt:
    name: sudo
    state: present
  when: "'sudo' in bootstrap_user_groups"

- name: "Make user {{ bootstrap_user_name }}"
  ansible.builtin.user:
    user: "{{ bootstrap_user_name }}"
    shell: /bin/bash
    password: "{{ bootstrap_user_pswd_hash }}"

- name: Ensure groups exist
  ansible.builtin.group:
    name: "{{ item }}"
    state: present
  loop: "{{ bootstrap_user_groups }}"
  when: bootstrap_user_groups | length > 0

- name: Ensure user is appended to groups
  ansible.builtin.user:
    name: "{{ bootstrap_user_name }}"
    groups: "{{ bootstrap_user_groups }}"
    append: true
  when: bootstrap_user_groups | length > 0

