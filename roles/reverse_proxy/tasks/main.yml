- name: ensure directory is created
  file:
    path: "{{ docker_dir }}/{{ role_name }}"
    state: directory
    owner: "{{ user }}"

- name: output Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: "{{ docker_dir }}/{{ role_name }}/Caddyfile"

- name: output compose file
  ansible.builtin.template:
    src: compose.j2
    dest: "{{ docker_dir }}/{{ role_name }}/compose.yml"

- name: output Dockerfile
  ansible.builtin.template:
    src: Dockerfile.j2
    dest: "{{ docker_dir }}/{{ role_name }}/Dockerfile"

- name: Make directory for acquis template
  ansible.builtin.file:
    path: "{{ docker_dir }}/{{ role_name }}/crowdsec/config/acquis.d/"
    state: directory
    mode: "0744"
    
- name: Output acquis.d file for caddy bouncer
  ansible.builtin.template:
    src: caddy_acquis.j2
    dest: "{{ docker_dir }}/{{ role_name }}/crowdsec/config/acquis.d/caddy.yaml"

- name: Output acquis.d file for gitea collection
  ansible.builtin.template:
    src: gitea_acquis.j2
    dest: "{{ docker_dir }}/{{ role_name }}/crowdsec/config/acquis.d/gitea.yaml"

- name: Output acquis.d file for vaultwarden collection
  ansible.builtin.template:
    src: vaultwarden_acquis.j2
    dest: "{{ docker_dir }}/{{ role_name }}/crowdsec/config/acquis.d/vaultwarden.yaml"

- name: Create reverse_proxy network 
  community.docker.docker_network:
    name: reverse_proxy

- name: Start {{ role_name }}
  community.docker.docker_compose_v2:
    project_src: "{{ docker_dir }}/{{ role_name }}"

- name: Make bouncer api key in crowdsec
  community.docker.docker_container_exec:
    container: crowdsec
    command: cscli bouncer add caddy --key {{ lookup('hashi_vault', 'secret=ansible/data/smalldog:crowdsec_caddy_bouncer_api token={{ vault_token }} url={{ vault_url }}') }}
  register: bouncer_resp
  failed_when: "bouncer_resp.rc != 0 and 'already exists' not in bouncer_resp.stderr"
  changed_when: "'already exists' not in bouncer_resp.stderr"
  notify:
    - Restart caddy
    - Restart crowdsec
