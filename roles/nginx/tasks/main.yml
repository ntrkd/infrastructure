---
- name: Ensure directory is created
  ansible.builtin.file:
    path: "{{ docker_dir }}/{{ role_name }}"
    state: directory
    mode: "0740"

- name: Ensure conf.d is created
  ansible.builtin.file:
    path: "{{ docker_dir }}/{{ role_name }}/conf.d"
    state: directory
    mode: "0740"

- name: Ensure stream.d is created
  ansible.builtin.file:
    path: "{{ docker_dir }}/{{ role_name }}/stream.d"
    state: directory
    mode: "0740"

- name: Output Dockerfile
  ansible.builtin.template:
    src: Dockerfile.j2
    dest: "{{ docker_dir }}/{{ role_name }}/Dockerfile"
    mode: "0740"
  notify:
    - Rebuild nginx image

- name: Output entrypoint.sh
  ansible.builtin.template:
    src: entrypoint.j2
    dest: "{{ docker_dir }}/{{ role_name }}/entrypoint.sh"
    mode: "0740"
  notify:
    - Rebuild nginx image

- name: Output acme-setup.sh
  ansible.builtin.template:
    src: acme-setup.j2
    dest: "{{ docker_dir }}/{{ role_name }}/acme-setup.sh"
    mode: "0740"
  notify:
    - Rebuild nginx image

- name: Output nginx.conf
  ansible.builtin.template:
    src: nginx.j2
    dest: "{{ docker_dir }}/{{ role_name }}/nginx.conf"
    mode: "0740"
  notify:
    - Restart nginx

- name: Output soju.conf
  ansible.builtin.template:
    src: soju.j2
    dest: "{{ docker_dir }}/{{ role_name }}/stream.d/soju.conf"
    mode: "0740"

- name: Output vaultwarden.conf
  ansible.builtin.template:
    src: vaultwarden.j2
    dest: "{{ docker_dir }}/{{ role_name }}/conf.d/vaultwarden.conf"
    mode: "0740"

- name: Output dokploy_services.conf
  ansible.builtin.template:
    src: dokploy_services.j2
    dest: "{{ docker_dir }}/{{ role_name }}/conf.d/dokploy_services.conf"
    mode: "0740"

- name: Output dokploy.conf
  ansible.builtin.template:
    src: dokploy.j2
    dest: "{{ docker_dir }}/{{ role_name }}/conf.d/dokploy.conf"
    mode: "0740"

- name: Output compose.yml
  ansible.builtin.template:
    src: compose.j2
    dest: "{{ docker_dir }}/{{ role_name }}/compose.yml"
    mode: "0740"
  notify:
    - Restart nginx

- name: Create nginx_reverse_proxy network
  community.docker.docker_network:
    name: nginx_reverse_proxy
    state: present

- name: Start docker container
  community.docker.docker_compose_v2:
    project_src: "{{ docker_dir }}/{{ role_name }}"
