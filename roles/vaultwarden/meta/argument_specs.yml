argument_specs:
  main:
    options:
      docker_dir:
        type: str
        required: true
        description: path to the docker container directory
      domain:
        type: str
        required: true
        description: the FQDN domain name (example.com)
      vaultwarden_uid:
        type: int
        required: true
        description: UID of the vaultwarden user
      vaultwarden_gid:
        type: int
        required: true
        description: GID of the vaultwarden user
