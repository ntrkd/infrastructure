- name: Make the user {{ role_name }}
  ansible.builtin.user:
    name: "{{ role_name }}"
    uid: "{{ vaultwarden_uid }}"
    create_home: false
    shell: /usr/sbin/nologin

- name: Make the group {{ role_name }}
  ansible.builtin.group:
    name: "{{ role_name }}"
    state: present
    gid: "{{ vaultwarden_gid }}"

- name: Ensure directory is created
  ansible.builtin.file:
    path: "{{ docker_dir }}/{{ role_name }}"
    state: directory
    mode: "0700"
    owner: "{{ vaultwarden_uid }}"
    group: "{{ vaultwarden_gid }}"

- name: Output compose file
  ansible.builtin.template:
    src: compose.j2
    dest: "{{ docker_dir }}/{{ role_name }}/compose.yml"
    mode: "0700"
    owner: "{{ vaultwarden_uid }}"
    group: "{{ vaultwarden_gid }}"
  notify:
    - Restart vaultwarden

- name: Start {{ role_name }}
  community.docker.docker_compose_v2:
    project_src: "{{ docker_dir }}/{{ role_name }}"

- name: Set permissions
  ansible.builtin.file:
    path: "{{ docker_dir }}/{{ role_name }}"
    owner: "{{ vaultwarden_uid }}"
    group: "{{ vaultwarden_gid }}"
    mode: "0700"
    recurse: true
